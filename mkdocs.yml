site_name: 用户手册
site_description: Examark 面向学校真实考试流程的操作手册、角色指南和部署文档。
site_url: https://docs.examark.net/
copyright: Copyright &copy; 2026 Examark. Powered by <a href="https://openmia.ai" target="_blank" rel="noopener">OpenMIA</a>

theme:
  name: material
  custom_dir: overrides
  language: zh
  logo: assets/examark.svg
  favicon: assets/examark.svg
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - zh
        - en

nav:
  - 首页: index.md
  - 快速开始:
      - Examark 是什么: getting-started/overview.md
      - 登录与组织入口: getting-started/login-org.md
      - 界面与导航: getting-started/navigation.md
      - 完成第一场考试: getting-started/first-exam.md
  - 考试全流程:
      - 流程总览: exam-workflow/overview.md
      - 新建考试: exam-workflow/create-exam.md
      - 配置考试协作: exam-workflow/collaboration.md
      - 试题编写: exam-workflow/paper-authoring.md
      - 预印与印刷数据: exam-workflow/preprint-printing.md
      - 扫描上传: exam-workflow/scanning.md
      - 客观复核与主观阅卷: exam-workflow/grading.md
      - 成绩发布与报告: exam-workflow/scores-reports.md
  - 角色操作手册:
      - 考试创建人手册: roles/exam-owner.md
      - 试题编写人手册: roles/paper-author.md
      - 扫描人员手册: roles/scanner.md
      - 阅卷教师手册: roles/grader.md
  - 扫描与印刷规范:
      - 扫描与识别 SOP: scanning-printing/sop.md
  - 权限与匿名化:
      - 权限模型概览: permissions/overview.md
      - 学校级角色与考试内角色: permissions/roles.md
      - 匿名阅卷与身份字段: permissions/anonymity.md
      - 常见权限场景: permissions/scenarios.md
      - 文件、导出与 render-data 保护: permissions/file-protection.md
  - 管理员指南:
      - 学校基础数据: admin/master-data.md
      - 教师、角色与绑定: admin/roles-teachers.md
      - 学生与家长档案: admin/students-guardians.md
      - 审计日志: admin/audit.md
  - 常见问题:
      - 普通用户 FAQ: faq/index.md
      - 故障处理: faq/troubleshooting.md
      - 权限问题: faq/permissions.md
  - 技术与部署:
      - 技术文档说明: technical/index.md
      - 截图补充清单: technical/screenshots.md
      - Linux 部署与排错: technical/deployment.md
